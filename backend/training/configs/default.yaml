# Default Configuration Settings
experiment_name: "default_run"

model:
  type: "unknown"
  params: {}

dataset:
  train_path: "data/train"
  val_path: "data/val"
  img_size: 256
  batch_size: 16
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2

training:
  epochs: 100
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  mixed_precision: true
  gradient_clip: 1.0
  seed: 42

loss:
  type: "l1"
  params: {}

optimizer:
  type: "adamw"
  betas: [0.9, 0.999]

logging:
  tensorboard_dir: "logs/tensorboard"
  log_freq_steps: 50

checkpointing:
  save_dir: "checkpoints"
  save_freq_epochs: 1
  resume: false
  resume_path: ""

distributed:
  backend: "nccl"
